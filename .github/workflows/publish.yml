name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          
    permissions:
      id-token: write         
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build wheel and sdist
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always
